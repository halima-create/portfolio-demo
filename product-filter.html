<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Filter · ML-based Sorting</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">HS</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="todo-app.html">Todo App</a></li>
          <li><a href="product-filter.html" class="active">Filter</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>

    <main class="container filter-page">
      <h2><i class="fas fa-filter"></i> Product Filter & Sort</h2>
      <p class="section-desc">
        Web Development Project · Dynamic Filtering & Sorting
      </p>

      <div class="filter-card">
        <div class="filter-bar">
          <div class="filter-group">
            <label><i class="fas fa-tags"></i> Category</label>
            <select id="categoryFilter">
              <option value="all">All Products</option>
              <option value="electronics">Electronics</option>
              <option value="clothing">Clothing</option>
              <option value="grocery">Grocery</option>
              <option value="home">Home & Kitchen</option>
              <option value="books">Books</option>
            </select>
          </div>

          <div class="filter-group">
            <label><i class="fas fa-rupee-sign"></i> Max Price (₹)</label>
            <input
              type="number"
              id="priceFilter"
              class="price-input"
              value="5000"
              min="100"
              max="50000"
              step="100"
            />
          </div>

          <div class="filter-group">
            <label><i class="fas fa-sort"></i> Sort by</label>
            <select id="sortSelect">
              <option value="default">Default</option>
              <option value="priceAsc">Price: Low to High</option>
              <option value="priceDesc">Price: High to Low</option>
              <option value="ratingDesc">Top Rated</option>
              <option value="nameAsc">Name A–Z</option>
            </select>
          </div>
        </div>

        <div id="productsContainer" class="products-grid"></div>

        <div id="noProductsMsg" class="no-products" style="display: none">
          <i class="fas fa-frown"></i> No products match the filters
        </div>
      </div>
    </main>

    <footer>
      <p>© 2025 Halimathu Sahadiya · Fresher Full-stack Developer</p>
    </footer>

    <script src="js/filter.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
